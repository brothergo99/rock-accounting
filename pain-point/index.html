<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪一種人？· Rock 會計家教</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#F5812A;--orange2:#FF9A4D;--orange3:#FFC285;--orange4:#FFE4C4;
  --cream:#FFF8F0;--cream2:#FFF0E0;--cream3:#FFE4C4;
  --brown:#7A3B10;--brown2:#A05020;--muted:#A08060;
  --ink:#2C1A0A;--white:#FFFFFF;--green:#06C755;
  --border:rgba(245,129,42,.18);
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--orange);color:#fff;font-size:11px;letter-spacing:.08em;text-align:center;padding:6px;font-weight:500}
.topbar a{color:#fff;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.4)}

nav{display:flex;justify-content:space-between;align-items:center;padding:0 clamp(1.2rem,4vw,3rem);height:56px;background:var(--white);border-bottom:2px solid var(--orange3)}
.nav-logo{font-family:var(--serif);font-size:1rem;font-weight:900;color:var(--orange);text-decoration:none}
.nav-back{font-size:.75rem;color:var(--brown2);text-decoration:none;display:flex;align-items:center;gap:4px;transition:.2s}
.nav-back:hover{color:var(--orange)}

/* ── STAGE: SELECTOR ── */
#stage-select{padding:clamp(2.5rem,6vh,5rem) clamp(1.2rem,4vw,3rem)}
.select-eyebrow{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:.7rem;text-align:center}
.select-title{font-family:var(--serif);font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;text-align:center;line-height:1.25;margin-bottom:.6rem}
.select-title em{font-style:normal;color:var(--orange)}
.select-sub{text-align:center;font-size:.9rem;color:var(--brown2);margin-bottom:3rem}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;max-width:960px;margin:0 auto}

.persona-btn{
  background:var(--white);border:2px solid var(--border);border-radius:8px;
  padding:1.8rem 1.5rem;cursor:pointer;text-align:left;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  display:flex;flex-direction:column;gap:.6rem;
  position:relative;overflow:hidden;
}
.persona-btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--orange);transform:scaleX(0);transform-origin:left;
  transition:transform .25s;
}
.persona-btn:hover{border-color:var(--orange);box-shadow:0 4px 20px rgba(245,129,42,.15);transform:translateY(-3px)}
.persona-btn:hover::before{transform:scaleX(1)}
.persona-btn.active{border-color:var(--orange);box-shadow:0 4px 20px rgba(245,129,42,.2);background:linear-gradient(160deg,#FFFAF4,var(--white))}
.persona-btn.active::before{transform:scaleX(1)}

.pb-icon{font-size:1.8rem;line-height:1}
.pb-type{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--orange)}
.pb-title{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--ink);line-height:1.3}
.pb-hint{font-size:.75rem;color:var(--muted);line-height:1.5}

/* ── STAGE: DETAIL ── */
#stage-detail{display:none;padding:clamp(2rem,5vh,4rem) clamp(1.2rem,4vw,3rem)}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--brown2);cursor:pointer;margin-bottom:2rem;background:none;border:none;padding:0;transition:.2s;font-family:var(--sans)}
.back-btn:hover{color:var(--orange)}

.detail-wrap{max-width:800px;margin:0 auto}

.detail-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:2px solid var(--orange3)}
.detail-type{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem}
.detail-type::before{content:'';width:20px;height:2px;background:var(--orange)}
.detail-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;line-height:1.2;margin-bottom:.8rem}
.detail-title em{font-style:normal;color:var(--orange)}

/* before/after */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
.ba-card{border-radius:6px;padding:1.4rem}
.ba-card.before{background:#fff5f2;border:1.5px solid rgba(200,80,40,.15)}
.ba-card.after{background:linear-gradient(160deg,#FFF8EE,#FFF2DC);border:1.5px solid var(--border)}
.ba-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.8rem;font-weight:600}
.ba-card.before .ba-label{color:rgba(180,60,30,.6)}
.ba-card.after .ba-label{color:var(--orange)}
.ba-list{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.ba-list li{font-size:.83rem;line-height:1.6;display:flex;gap:.5rem;align-items:flex-start}
.ba-card.before .ba-list li::before{content:'✕';color:rgba(200,80,40,.5);font-size:.7rem;flex-shrink:0;padding-top:.15rem}
.ba-card.after .ba-list li::before{content:'✓';color:var(--orange);font-weight:700;font-size:.7rem;flex-shrink:0;padding-top:.15rem}

/* cost list */
.cost-section{margin-bottom:2rem}
.cost-title-row{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.cost-items{display:flex;flex-direction:column;gap:8px}
.cost-row{display:grid;grid-template-columns:1.6rem 1fr;gap:0 .8rem;padding:.9rem 1rem;background:var(--white);border:1.5px solid var(--border);border-radius:6px;align-items:start}
.cost-icon{font-size:.9rem;padding-top:.1rem}
.cost-name{font-size:.78rem;font-weight:600;color:var(--brown);margin-bottom:.2rem}
.cost-desc{font-size:.77rem;color:var(--brown2);line-height:1.6}
.cost-desc strong{color:var(--brown);font-weight:600}

/* outcomes */
.outcome-section{margin-bottom:2rem}
.outcome-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.2rem}
.otag{display:inline-block;background:var(--orange);color:#fff;font-size:.65rem;letter-spacing:.07em;padding:4px 11px;border-radius:3px}

/* testimonial */
.testi-box{background:var(--cream2);border:1.5px solid var(--border);border-radius:6px;padding:1.4rem 1.5rem;margin-bottom:2rem}
.testi-stars{color:var(--orange);font-size:.7rem;margin-bottom:.6rem}
.testi-text{font-family:var(--serif);font-size:.92rem;color:var(--ink);line-height:1.85}
.testi-text::before{content:'「';color:var(--orange)}
.testi-text::after{content:'」';color:var(--orange)}
.testi-who{font-size:.72rem;color:var(--muted);margin-top:.6rem}

/* CTA */
.cta-box{background:linear-gradient(135deg,var(--white),var(--cream2));border:2px solid var(--orange3);border-radius:8px;padding:2rem;text-align:center}
.cta-box h3{font-family:var(--serif);font-size:1.15rem;font-weight:900;margin-bottom:.6rem;color:var(--ink)}
.cta-box h3 em{font-style:normal;color:var(--orange)}
.cta-box p{font-size:.83rem;color:var(--brown2);line-height:1.75;margin-bottom:1.4rem}
.cta-line{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-size:.88rem;font-weight:600;padding:13px 28px;border-radius:5px;text-decoration:none;transition:.2s;margin-bottom:.7rem}
.cta-line:hover{background:#05b34c;transform:translateY(-2px)}
.cta-note{font-size:.72rem;color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .ba-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:400px){
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">每週日 21:00 Ekkorn 免費直播 · <a href="https://brothergo99.github.io/rock-accounting/" target="_blank">回主頁</a></div>

<nav>
  <a class="nav-logo" href="https://brothergo99.github.io/rock-accounting/">Rock 會計家教</a>
  <a class="nav-back" href="https://brothergo99.github.io/rock-accounting/">← 回主頁</a>
</nav>

<!-- ══ STAGE 1：選擇器 ══ -->
<div id="stage-select">
  <div class="select-eyebrow">找到你的狀況</div>
  <h1 class="select-title">你現在是<em>哪一種人？</em></h1>
  <p class="select-sub">選一個最接近你的，看財報卡住你的方式和解法</p>

  <div class="cards-grid">

    <button class="persona-btn" onclick="showDetail('exam-uni')">
      <span class="pb-icon">🎓</span>
      <div class="pb-type">備考生</div>
      <div class="pb-title">大學生<br>跟不上會計課</div>
      <div class="pb-hint">學校進度太快，自己讀完全記不住</div>
    </button>

    <button class="persona-btn" onclick="showDetail('exam-keeji')">
      <span class="pb-icon">📋</span>
      <div class="pb-type">備考生</div>
      <div class="pb-title">記帳士<br>考了沒過</div>
      <div class="pb-hint">函授上完、補習班上完，考場上還是靠猜</div>
    </button>

    <button class="persona-btn" onclick="showDetail('work-entry')">
      <span class="pb-icon">🚪</span>
      <div class="pb-type">職場人士</div>
      <div class="pb-title">想入行<br>做會計</div>
      <div class="pb-hint">沒有會計背景，不知道從哪裡切入</div>
    </button>

    <button class="persona-btn" onclick="showDetail('work-upgrade')">
      <span class="pb-icon">📈</span>
      <div class="pb-type">職場人士</div>
      <div class="pb-title">已做會計<br>想升主辦</div>
      <div class="pb-hint">卡在基層，上不去</div>
    </button>

    <button class="persona-btn" onclick="showDetail('work-owner')">
      <span class="pb-icon">🏢</span>
      <div class="pb-type">企業主 / 接班人</div>
      <div class="pb-title">看不懂<br>自己公司的報表</div>
      <div class="pb-hint">接家裡事業，數字看懂才能真正接班</div>
    </button>

    <button class="persona-btn" onclick="showDetail('work-fundraise')">
      <span class="pb-icon">💼</span>
      <div class="pb-type">創業者</div>
      <div class="pb-title">要募資<br>財模說不清楚</div>
      <div class="pb-hint">投資人問四張表，你卡住了</div>
    </button>

    <button class="persona-btn" onclick="showDetail('work-other')">
      <span class="pb-icon">🔧</span>
      <div class="pb-type">其他職場人士</div>
      <div class="pb-title">非會計背景<br>需要讀懂財報</div>
      <div class="pb-hint">SAP顧問、人資、業務、運動員……工作開始跟數字有關</div>
    </button>

    <button class="persona-btn" onclick="showDetail('invest')">
      <span class="pb-icon">📊</span>
      <div class="pb-type">投資人</div>
      <div class="pb-title">選股差最後一層<br>那層叫財報</div>
      <div class="pb-hint">技術分析會了，但財報看不懂</div>
    </button>

  </div>
</div>

<!-- ══ STAGE 2：詳細內容 ══ -->
<div id="stage-detail">
  <div class="detail-wrap">
    <button class="back-btn" onclick="goBack()">← 重新選擇</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const personas = {

  'exam-uni': {

    after: [
      '每個分錄背後的商業邏輯你都清楚',

    ],
    costs: [
      { icon: '⏳', name: '時間代價', desc: '自己讀沒有方向，花了幾十小時還停在原地，期末前才發現來不及' },
      { icon: '💸', name: '金錢代價', desc: '補習班課程費用 NT$10,000 起，但只教你答案，不教你為什麼——換一題還是不會' },
      { icon: '😰', name: '情緒代價', desc: '每次考完看到分數那種「我是不是不適合」的感覺，會影響你對整個科系的信心' }
    ],
    outcomes: ['初級會計學', '中級會計學', '成本會計', '考前衝刺', '95%+ 通過率'],
    testi: {
      text: '第一次遇到這麼有趣的會計，也會盡可能把財務報表變得容易理解！',
      who: '匿名學生 · 初會備考 · 2024'
    },
    cta_title: '說說你卡在哪裡',
    cta_body: 'Rock 會直接告訴你問題出在哪，以及你需要多少時間把它補起來。'
  },

  'exam-keeji': {
    icon: '📋',
    type: '備考生',
    title: '函授上了一整年，<em>考場上還是靠猜</em>',
    before: [
      '函授或補習班上完，題目換個包裝就不會',
      '花了一整年時間和學費，沒有拿到那張證書',
      '不知道自己哪裡真的不懂，只能再重來',
      '考試一次次延後，職涯跟著卡住'
    ],
    after: [
      '理解會計的邏輯結構，而不是死記答案',
      '三個月內完成補強，重新上考場',
      '超過 95% 的學生在考前就知道自己準備好了',
      '拿到證書，打開下一階段的職涯選擇'
    ],
    costs: [
      { icon: '💸', name: '金錢代價', desc: '函授一年費用 NT$15,000–30,000，沒過就是全部白費，還要再花一次' },
      { icon: '⏳', name: '時間代價', desc: '一年的備考時間是你的機會成本。沒過的每一年，都是你晚一年升職或轉職' },
      { icon: '😰', name: '情緒代價', desc: '重考帶來的自我懷疑是真實的，會讓你開始覺得自己「不適合做這行」' }
    ],
    outcomes: ['記帳士', '初會', '中會', '考試邏輯補強', '函授失敗後轉來'],
    testi: {

    },
    cta_title: '你之前卡在哪一關？',
    cta_body: '告訴 Rock 你上過什麼、考了幾次，他直接說問題在哪，以及這次要怎麼準備才能過。'

  'work-entry': {
    icon: '🚪',
    type: '職場人士',
    title: '想入行做會計，<em>不知道從哪裡切入</em>',

    testi: {
      text: '因老師待過業界和學術界，課堂中結合實務，以淺顯易懂的方式讓我快速理解，值得推薦的好老師。',
      who: 'Erin · 職場進修 · 2024'
    },
    cta_title: '你現在卡在哪一關？',
    cta_body: '說說你現在的職位和想去的地方，Rock 直接告訴你差在哪裡。'

  'work-owner': {
    icon: '🏢',
    type: '企業主 / 接班人',
    title: '接家裡事業，<em>但看不懂公司的報表</em>',

    costs: [

function showDetail(key) {
  const p = personas[key]
  if (!p) return

  // 標記 active
  document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'))
  event.currentTarget.classList.add('active')

  // 組裝內容
  const costsHTML = p.costs.map(c => `
    <div class="cost-row">
      <span class="cost-icon">${c.icon}</span>
      <div>
        <div class="cost-name">${c.name}</div>
        <div class="cost-desc">${c.desc}</div>
      </div>
    </div>
  `).join('')

  const outcomesHTML = p.outcomes.map(o => `<span class="otag">${o}</span>`).join('')

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-type">${p.icon} ${p.type}</div>
      <h2 class="detail-title">${p.title}</h2>
    </div>

    <div class="ba-grid">
      <div class="ba-card before">
        <div class="ba-label">找到 Rock 之前</div>
        <ul class="ba-list">
          ${p.before.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
      <div class="ba-card after">
        <div class="ba-label">找到 Rock 之後</div>
        <ul class="ba-list">
          ${p.after.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="cost-section">
      <div class="cost-title-row">你現在正在付出的代價</div>
      <div class="cost-items">${costsHTML}</div>
    </div>

    <div class="outcome-section">
      <div class="cost-title-row" style="margin-bottom:.8rem">這類學生在學的東西</div>
      <div class="outcome-tags">${outcomesHTML}</div>
    </div>

    <div class="testi-box">
      <div class="testi-stars">★★★★★</div>
      <div class="testi-text">${p.testi.text}</div>
      <div class="testi-who">${p.testi.who}</div>
    </div>

    <div class="cta-box">
      <h3>${p.cta_title}，<em>說給 Rock 聽</em></h3>
      <p>${p.cta_body}<br>不適合的，他不會叫你來上課。</p>
      <a class="cta-line" href="https://line.me/R/ti/p/@365poxew" target="_blank">💬 加 LINE 免費諮詢</a><br>
      <span class="cta-note">免費 · 說清楚你的狀況就夠了</span>
    </div>
  `

  document.getElementById('stage-select').style.display = 'none'
  const detail = document.getElementById('stage-detail')
  detail.style.display = 'block'
  detail.scrollIntoView({behavior:'smooth', block:'start'})
}

function goBack() {
  document.getElementById('stage-detail').style.display = 'none'
  document.getElementById('stage-select').style.display = 'block'
  window.scrollTo({top:0, behavior:'smooth'})
}
</script>
